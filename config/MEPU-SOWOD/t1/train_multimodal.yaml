_BASE_: "./train.yaml"

# Multi-Modal Configuration
MULTIMODAL:
  ENABLED: True
  CLIP_MODEL: "ViT-B/32"  
  FUSION_TYPE: "attention"  
  OUTPUT_DIM: 1024  
  VISUAL_WEIGHT: 0.6  
  SEMANTIC_WEIGHT: 0.4  
  
# Uncertainty Estimation Configuration
UNCERTAINTY:
  ENABLED: True
  MC_DROPOUT: True  
  MC_SAMPLES: 10  
  ENSEMBLE_SIZE: 3  
  CALIBRATION: "temperature"  
  THRESHOLD: 0.3  
  DYNAMIC_THRESHOLD: True  
  THRESHOLD_METHOD: "percentile"  
  THRESHOLD_PERCENTILE: 0.7  

# Open-World Detection Configuration
OPENSET:
  INFERENCE_SELT_TRAIN: False
  OLN_INFERENCE: False
  REW:
    ENABLED: True
    GAMMA: 4.0  
    MULTIMODAL: True  
  
  # Pseudo-Label Configuration
  PSEUDO_LABEL:
    UNCERTAINTY_FILTERING: True  
    QUALITY_WEIGHTING: True  
    ACTIVE_LEARNING: True  
    ACTIVE_LEARNING_BUDGET: 1000  
    UNCERTAINTY_THRESHOLD: 0.3  
    CONFIDENCE_THRESHOLD: 0.5  
    REW_THRESHOLD: 0.6  
    QUALITY_THRESHOLD: 0.5  

# Dataset Configuration
DATASETS:
  TRAIN: ("sowod_train_t1_multimodal",)
  TEST: ("sowod_val",)

# Training Configuration
SOLVER:
  IMS_PER_BATCH: 8  
  BASE_LR: 0.005
  STEPS: (60000, 80000)
  MAX_ITER: 90000
  WARMUP_ITERS: 1000
  CHECKPOINT_PERIOD: 5000

DATALOADER:
  NUM_WORKERS: 4

INPUT:
  MIN_SIZE_TRAIN: (640, 672, 704, 736, 768, 800)
  MAX_SIZE_TRAIN: 1333
  MIN_SIZE_TEST: 800
  MAX_SIZE_TEST: 1333

OUTPUT_DIR: "training_dir/multimodal-mepu/sowod-t1-train"

# Evaluation Configuration
TEST:
  EVAL_PERIOD: 5000
  
# Logging
VIS_PERIOD: 1000

SEED: 42
VERSION: 2
